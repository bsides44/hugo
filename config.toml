      quote = "&ldquo;Maddy was the bridge between us and the developers - us and a world we did not understand. Working with her has been a dream. She exceeded my expectations, which was delightful, because many had underdelivered before. Her work ethic was unquestionable and I always felt like she went above and beyond for us. She is straight up, efficient and conscientious, and best of all she’s a problem solver not a problem moaner. I'd recommend Maddy to anyone who needs a project manager, an all-rounder, a brainstormer, a development advisor, a developer, an everything-er.&rdquo;"
